version: '3.9'

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    ports:
      - '3000:3000'
    volumes:
      - ../apps/api/src:/app/src  # hot reload
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      API_SECRET: dev-secret
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: closeai
      DB_PASSWORD: closeai_dev
      DB_NAME: closeai
      REDIS_URL: redis://redis:6379
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN}
      META_APP_SECRET: ${META_APP_SECRET}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      AI_PROVIDER: anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
       - '3307:3306'   
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: closeai
      MYSQL_USER: closeai
      MYSQL_PASSWORD: closeai_dev
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot_dev']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
